<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#111414" />
    <meta name="description" content="모바일 전용 수집형 웹 RPG, 푸아 Web Alpha." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="푸아" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>푸아 Web Alpha 0.4</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="assets/ui/icon-192.png" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-shell">
      <section class="start-screen" id="startScreen">
        <canvas class="start-canvas" id="startCanvas" aria-hidden="true"></canvas>
        <div class="start-copy">
          <p class="eyebrow">PUA WEB ALPHA 0.4.0</p>
          <h1>푸아</h1>
          <p>
            완벽한 균형의 대륙 펜타티온. 코어 내부에서 발견된 신호
            <strong>[양자]</strong>가 모든 질서를 뒤틀기 시작했다.
          </p>
          <div class="start-actions">
            <button class="primary-button" id="startButton" type="button">게스트 시작</button>
            <button class="ghost-button" id="continueButton" type="button">이어하기</button>
          </div>
        </div>
      </section>

      <header class="topbar">
        <div class="brand-block">
          <span class="brand-mark" data-action="hidden-trigger" data-id="penta_mark" aria-hidden="true"></span>
          <div>
            <p class="eyebrow">PENTATION CORE</p>
            <h2>푸아</h2>
          </div>
        </div>
        <div class="wallet" id="wallet"></div>
      </header>

      <main class="view" id="view" tabindex="-1"></main>

      <nav class="tabbar" aria-label="주요 메뉴">
        <button class="tab-button" data-tab="home" type="button">
          <span aria-hidden="true">⌂</span>
          HOME
        </button>
        <button class="tab-button" data-tab="stage" type="button">
          <span aria-hidden="true">◇</span>
          STAGE
        </button>
        <button class="tab-button" data-tab="unit" type="button">
          <span aria-hidden="true">✦</span>
          UNIT
        </button>
        <button class="tab-button" data-tab="gacha" type="button">
          <span aria-hidden="true">◈</span>
          GACHA
        </button>
        <button class="tab-button" data-tab="menu" type="button">
          <span aria-hidden="true">☰</span>
          MENU
        </button>
      </nav>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <dialog class="modal" id="modal">
      <div class="modal-body">
        <button class="icon-button modal-close" id="modalClose" type="button" aria-label="닫기">×</button>
        <div id="modalContent"></div>
      </div>
    </dialog>

    <script type="module" src="main.js"></script>
  </body>
</html>
